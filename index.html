<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save the Leader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container">
      <h1>Save the Leader</h1>
      <div id="status-bar">
        <span id="timer">残り時間: 7秒</span>
        <span id="message">線を一本引いて守れ！</span>
      </div>

      <canvas id="gameCanvas" width="600" height="500"></canvas>

      <div id="controls">
        <button id="resetBtn">もう一度挑戦</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
